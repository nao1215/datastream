name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    name: Format / Lint / Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: erlef/setup-beam@v1
        with:
          otp-version: "28"
          gleam-version: "1.15.2"

      - name: Download dependencies
        run: gleam deps download

      - name: Format check
        run: gleam format --check src/ test/

      - name: Type check
        run: gleam check

      - name: Lint (glinter, warnings as errors)
        run: gleam run -m glinter

  build-and-test:
    name: Build and test (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [erlang, javascript]
    steps:
      - uses: actions/checkout@v6

      - uses: erlef/setup-beam@v1
        with:
          otp-version: "28"
          gleam-version: "1.15.2"

      - name: Set up Node.js
        if: matrix.target == 'javascript'
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Download dependencies
        run: gleam deps download

      - name: Build (warnings as errors)
        run: gleam build --warnings-as-errors --target ${{ matrix.target }}

      - name: Test
        run: gleam test --target ${{ matrix.target }}
